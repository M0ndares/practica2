<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probando Estructura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="vh-100">
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <div class="col-3 bg-dark h-100">
                <h2 class="text-white text-center p-3">Práctica 2</h2>
                <ul class="text-white text-decoration-none">
                    <li>Inicio</li>
                    <li>Agregar productos</li>
                    <li>Listar productos</li>
                </ul>
            </div>
            <div class="col-9 pt-5">
                <h3 class="text-center">Formulario de Ventas</h3>
                <p class="text-center text-white fs-5">Principal</p>
                <div class="container">

                    <form class="row g-3">
                        <div class="col-md-4">
                            <label for="idInventario" class="form-label">ID/Inventario</label>
                            <input type="number" class="form-control" id="idInventario">
                        </div>
                        <div class="col-md-4">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>
                        <div class="col-md-4">
                            <label for="departamento" class="form-label">Departamento</label>
                            <select id="departamento" class="form-select">
                                <option selected>Seleccione</option>
                                <option>Verduras</option>
                                <option>Frutas</option>
                                <option>Lácteos</option>
                            </select>
                        </div>
                    </form>
                    <div class="col-12 text-end">
                             <button onclick="listo()" class="btn btn-success">Guardar datos</button>
                        </div>
                        <div class="col-12 text-center">
                             <button  class="btn btn-primary" onclick="createTable('T')">Lista completa</button>
                             <button type="submit" class="btn btn-success" onclick="createTable('Frutas')">Frutas</button>
                             <button type="submit" class="btn btn-warning" onclick="createTable('Verduras')">Verduras</button>
                             <button type="submit" class="btn btn-info" onclick="createTable('Lácteos')">Lácteos</button>
                             <button type="submit" class="btn btn-danger" onclick="createTable('O')">Ocultar lista</button>
                        </div>
                    <h2>Lista de Productos</h2>
                    <table class="table table-striped">
                        <thead class="thead-dark">
                            <tr>
                                <th>ID</th>
                                <th>Descripcion</th>
                                <th>Departamento</th>
                            </tr>
                        </thead>
                        <tbody id="tabla">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    </body>
</html>
